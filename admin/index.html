<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Admin Masjid Noor Islam</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- ✅ Gunakan versi stabil, JANGAN beta -->
  <script src="https://cdn.jsdelivr.net/npm/decap-cms@3.0.0/dist/decap-cms.js"></script>
</head>

<body>

<!-- 🔥 ROOT CONTAINER (INI KUNCI FIX ERROR appendChild) -->
<div id="nc-root"></div>

<script>
  console.log("INIT CMS...");

  function initCMS() {
    if (window.CMS) {
      console.log("CMS FOUND");

      window.CMS.init({
        config: "/admin/config.yml"
      });

    } else {
      console.log("WAITING CMS...");
      setTimeout(initCMS, 300);
    }
  }

  initCMS();
</script>

</body>
</html>
