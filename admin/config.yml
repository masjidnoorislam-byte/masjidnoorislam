# ================================================================
#  Decap CMS — Masjid Noor Islam Yogyakarta
#  Backend: Netlify Git Gateway
#  Storage: JSON files in /_data/
#  Docs: https://decapcms.org/docs/
# ================================================================

backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

site_url: https://masjidnoorislam.netlify.app
display_url: https://masjidnoorislam.netlify.app
logo_url: /images/uploads/logo.jpg
locale: id

# ── COLLECTIONS ─────────────────────────────────────────────────
collections:

  # ── 1. KEGIATAN ───────────────────────────────────────────────
  - name: kegiatan
    label: "📅 Kegiatan"
    label_singular: "Kegiatan"
    description: "Agenda dan kegiatan rutin masjid. Maksimal 3 item tampil di Beranda."
    folder: "_data/kegiatan"
    create: true
    delete: true
    slug: "{{slug}}"
    identifier_field: judul
    summary: "{{judul}} — {{tanggal}}"
    sortable_fields: ["tanggal", "urutan", "judul"]
    view_filters:
      - label: "Aktif"
        field: status
        pattern: true
      - label: "Arsip"
        field: status
        pattern: false
    fields:
      - label: "Judul Kegiatan"
        name: judul
        widget: string
        hint: "Contoh: Kajian Tafsir Al-Qur'an bersama Ust. Ahmad"

      - label: "Kategori"
        name: kategori
        widget: select
        options:
          - { label: "📖 Kajian", value: "Kajian" }
          - { label: "🤲 Sosial", value: "Sosial" }
          - { label: "📚 Pendidikan", value: "Pendidikan" }
          - { label: "📢 Pengumuman", value: "Pengumuman" }
          - { label: "🕌 Umum", value: "Umum" }
        default: "Kajian"

      - label: "Tanggal"
        name: tanggal
        widget: datetime
        format: "YYYY-MM-DD"
        date_format: "DD MMMM YYYY"
        time_format: false
        hint: "Tanggal pelaksanaan kegiatan"

      - label: "Waktu"
        name: waktu
        widget: string
        hint: "Contoh: 05:30–07:00 WIB"
        required: false

      - label: "Tempat"
        name: tempat
        widget: string
        default: "Masjid Noor Islam"
        required: false

      - label: "Gambar"
        name: gambar
        widget: image
        required: false
        hint: "Ukuran ideal: 600×300px. Kosongkan untuk gambar otomatis."
        allow_multiple: false

      - label: "Deskripsi Singkat"
        name: deskripsi
        widget: text
        hint: "Tampil di kartu kegiatan. Maksimal 120 karakter."
        pattern: [".{1,200}", "Terlalu panjang — maksimal 200 karakter"]

      - label: "Isi Lengkap (opsional)"
        name: body
        widget: markdown
        required: false
        hint: "Isi detail untuk halaman ?detail=slug. Mendukung format Markdown."
        minimal: true

      - label: "Tampilkan di website"
        name: status
        widget: boolean
        default: true
        hint: "Nonaktifkan untuk menyembunyikan kegiatan ini"

      - label: "Urutan Tampil"
        name: urutan
        widget: number
        default: 99
        value_type: int
        min: 1
        max: 999
        hint: "Angka lebih kecil tampil lebih awal. Urutan 1 = unggulan (featured)."

  # ── 2. DONASI ─────────────────────────────────────────────────
  - name: donasi
    label: "💛 Donasi & Rekening"
    description: "Informasi rekening bank dan QR Code QRIS untuk donasi"
    files:
      - name: donasi
        label: "Pengaturan Donasi"
        file: "_data/donasi.json"
        fields:
          - label: "Nama Rekening"
            name: nama_rekening
            widget: string
            default: "Masjid Noor Islam"
            hint: "Nama pemilik rekening"

          - label: "Nomor Rekening BSI"
            name: nomor_rekening
            widget: string
            default: ""
            hint: "Contoh: 7140123456789"

          - label: "Gambar QR Code QRIS"
            name: qris_image
            widget: image
            required: false
            hint: "Upload gambar QR QRIS Anda. Ukuran: 220×220px."

  # ── 3. KONTAK ─────────────────────────────────────────────────
  - name: kontak
    label: "📞 Kontak & Lokasi"
    description: "Nomor WhatsApp, alamat, dan embed Google Maps"
    files:
      - name: kontak
        label: "Pengaturan Kontak"
        file: "_data/kontak.json"
        fields:
          - label: "Nomor WhatsApp"
            name: whatsapp
            widget: string
            default: "6281234567890"
            hint: "Format: 628xxxxxxxxxx (tanpa + dan spasi)"

          - label: "Alamat Lengkap"
            name: alamat
            widget: string
            default: "Jl. Gayam No.19, Semaki, Umbulharjo, Yogyakarta 55166"

          - label: "Google Maps Embed URL"
            name: maps_embed
            widget: string
            required: false
            hint: "Salin URL dari Google Maps → Share → Embed a map → salin src='...'"

  # ── 4. TRANSPARANSI ───────────────────────────────────────────
  - name: transparansi
    label: "📊 Transparansi Keuangan"
    description: "URL Google Sheets untuk embed laporan keuangan"
    files:
      - name: transparansi
        label: "Pengaturan Transparansi"
        file: "_data/transparansi.json"
        fields:
          - label: "URL Google Sheets (embed)"
            name: embed_url
            widget: string
            required: false
            hint: "Dari Google Sheets: File → Share → Publish to web → salin URL"

  # ── 5. JADWAL SHOLAT ──────────────────────────────────────────
  - name: jadwal
    label: "🕌 Jadwal Sholat"
    description: "Override jadwal sholat manual. Biarkan kosong untuk pakai API otomatis."
    files:
      - name: jadwal
        label: "Jadwal Sholat"
        file: "_data/jadwal.json"
        fields:
          - label: "Aktifkan jadwal manual"
            name: manual_mode
            widget: boolean
            default: false
            hint: "Aktifkan hanya jika ingin override jadwal dari API Aladhan"

          - label: "Subuh"
            name: subuh
            widget: string
            default: ""
            required: false
            hint: "Format: HH:MM — contoh: 04:15"

          - label: "Dzuhur"
            name: dzuhur
            widget: string
            default: ""
            required: false

          - label: "Ashar"
            name: ashar
            widget: string
            default: ""
            required: false

          - label: "Maghrib"
            name: maghrib
            widget: string
            default: ""
            required: false

          - label: "Isya"
            name: isya
            widget: string
            default: ""
            required: false
