# ================================================================
#  Decap CMS — Masjid Noor Islam Yogyakarta
#  Backend: GitHub via Cloudflare Workers (OAuth)
# ================================================================

backend:
  name: github
  repo: masjidnoorislam-byte/adamasjid.com
  branch: main
  base_url: https://fancy-star-77d2.masjidnoorislam.workers.dev
  auth_endpoint: auth

media_folder: "images/uploads"
public_folder: "/images/uploads"

site_url: https://masjidnoorislam.pages.dev
display_url: https://masjidnoorislam.pages.dev
logo_url: /images/uploads/logo.jpg
locale: id

# ── COLLECTIONS ─────────────────────────────────────────────────
collections:

  # ── 1. KEGIATAN ───────────────────────────────────────────────
  - name: kegiatan
    label: "📅 Kegiatan"
    label_singular: "Kegiatan"
    description: "Agenda dan kegiatan rutin masjid. Maksimal 3 item tampil di Beranda."
    folder: "_data/kegiatan"
    create: true
    delete: true
    slug: "{{slug}}"
    identifier_field: judul
    summary: "{{judul}} — {{tanggal}}"
    sortable_fields: ["tanggal", "urutan", "judul"]
    view_filters:
      - label: "Aktif"
        field: status
        pattern: true
      - label: "Arsip"
        field: status
        pattern: false
    fields:
      - label: "Judul Kegiatan"
        name: judul
        widget: string
        hint: "Contoh: Kajian Tafsir Al-Qur'an bersama Ust. Ahmad"

      - label: "Kategori"
        name: kategori
        widget: select
        options:
          - { label: "📖 Kajian", value: "Kajian" }
          - { label: "🤲 Sosial", value: "Sosial" }
          - { label: "📚 Pendidikan", value: "Pendidikan" }
          - { label: "📢 Pengumuman", value: "Pengumuman" }
          - { label: "🕌 Umum", value: "Umum" }
        default: "Kajian"

      - label: "Tanggal"
        name: tanggal
        widget: datetime
        format: "YYYY-MM-DD"
        date_format: "DD MMMM YYYY"
        time_format: false
        hint: "Tanggal pelaksanaan kegiatan"

      - label: "Waktu"
        name: waktu
        widget: string
        hint: "Contoh: 05:30–07:00 WIB"
        required: false

      - label: "Tempat"
        name: tempat
        widget: string
        default: "Masjid Noor Islam"
        required: false

      - label: "Gambar"
        name: gambar
        widget: image
        required: false
        hint: "Ukuran ideal: 600×300px. Kosongkan untuk gambar otomatis."
        allow_multiple: false

      - label: "Deskripsi Singkat"
        name: deskripsi
        widget: text
        hint: "Tampil di kartu kegiatan. Maksimal 120 karakter."
        pattern: [".{1,200}", "Terlalu panjang — maksimal 200 karakter"]

      - label: "Isi Lengkap (opsional)"
        name: body
        widget: markdown
        required: false
        hint: "Isi detail untuk halaman ?detail=slug. Mendukung format Markdown."
        minimal: true

      - label: "Tampilkan di website"
        name: status
        widget: boolean
        default: true
        hint: "Nonaktifkan untuk menyembunyikan kegiatan ini"

      - label: "Urutan Tampil"
        name: urutan
        widget: number
        default: 99
        value_type: int
        min: 1
        max:
