const config = {
  client_id: "Ov23liKuYvqw94izZPvi",
  client_secret: "96ee234498fd2fb18d02e7f964837b2c6f97e041" 
};

export default {
  async fetch(request) {
    const url = new URL(request.url);
    if (url.pathname === "/auth") {
      return Response.redirect(`https://github.com/login/oauth/authorize?client_id=${config.client_id}&scope=repo,user`);
    }
    if (url.pathname === "/callback") {
      const code = url.searchParams.get("code");
      const response = await fetch("https://github.com/login/oauth/access_token", {
        method: "POST",
        headers: { "content-type": "application/json", "accept": "application/json" },
        body: JSON.stringify({ client_id: config.client_id, client_secret: config.client_secret, code })
      });
      const result = await response.json();
      return new Response(`
        <script>
          const postData = {token: "${result.access_token}", provider: "github"};
          window.opener.postMessage("authorizing:github:success:" + JSON.stringify(postData), "*");
          window.close();
        </script>
      `, { headers: { "content-type": "text/html" } });
    }
    return new Response("Auth Gateway Masjid Noor Islam Aktif");
  }
};
